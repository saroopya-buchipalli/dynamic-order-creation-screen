<template>
    <lightning-card title="Create Order" icon-name="standard:order">

        <!-- SUCCESS SCREEN -->
        <template if:true={isSubmitted}>
            <div class="slds-p-around_large slds-text-align_center">
                <lightning-icon icon-name="action:approval" size="large"></lightning-icon>
                <h2 class="slds-text-heading_medium slds-m-top_medium">Order Created Successfully!</h2>
                <p class="slds-text-color_weak slds-m-top_small">Order ID: <strong>{createdOrderId}</strong></p>
                <lightning-button
                    label="Create New Order"
                    variant="brand"
                    onclick={handleReset}
                    class="slds-m-top_medium">
                </lightning-button>
            </div>
        </template>

        <!-- MAIN FORM -->
        <template if:false={isSubmitted}>
            <div class="slds-p-around_medium">

                <!-- ORDER DETAILS -->
                <div class="slds-section slds-is-open slds-m-bottom_medium">
                    <h3 class="slds-section__title slds-theme_shade slds-p-around_x-small">
                        <span class="slds-truncate">Order Details</span>
                    </h3>
                    <div class="slds-grid slds-gutters slds-m-top_small">
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input
                                label="Customer Name"
                                value={customerName}
                                onchange={handleCustomerName}
                                required
                                field-level-help="Name of the customer placing the order">
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input
                                type="date"
                                label="Order Date"
                                value={orderDate}
                                onchange={handleOrderDate}
                                required>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input
                                label="Order Reference"
                                value={orderRef}
                                onchange={handleOrderRef}
                                placeholder="e.g. PO-12345 (optional)">
                            </lightning-input>
                        </div>
                    </div>
                </div>

                <!-- ADD PRODUCTS -->
                <div class="slds-section slds-is-open slds-m-bottom_medium">
                    <h3 class="slds-section__title slds-theme_shade slds-p-around_x-small">
                        <span class="slds-truncate">Add Products</span>
                    </h3>

                    <div class="slds-grid slds-gutters slds-m-top_small">
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox
                                label="Product Category"
                                value={selectedCategory}
                                options={categoryOptions}
                                onchange={handleCategoryChange}
                                placeholder="-- Select a Category --"
                                required>
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input
                                label="Search Products"
                                value={searchQuery}
                                onchange={handleSearch}
                                placeholder="Search by product name..."
                                disabled={isCategoryEmpty}>
                            </lightning-input>
                        </div>
                    </div>

                    <!-- Loading Spinner -->
                    <template if:true={isLoadingProducts}>
                        <div class="slds-m-top_medium slds-text-align_center">
                            <lightning-spinner alternative-text="Loading products..." size="small"></lightning-spinner>
                        </div>
                    </template>

                    <!-- Product Cards -->
                    <template if:true={showProducts}>
                        <div class="slds-m-top_medium">
                            <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                                Available Products ({selectedCategoryName})
                            </p>
                            <template if:true={hasFilteredProducts}>
                                <div class="slds-grid slds-wrap slds-gutters">
                                    <template for:each={filteredProducts} for:item="prod">
                                        <div key={prod.Id} class="slds-col slds-size_1-of-4 slds-m-bottom_small">
                                            <div class={prod.cardClass}>
                                                <div class="slds-media slds-media_center slds-m-bottom_x-small">
                                                    <div class="slds-media__figure">
                                                        <lightning-icon icon-name="standard:product" size="small">
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="slds-media__body">
                                                        <p class="slds-text-heading_small">{prod.Name}</p>
                                                        <p class="slds-text-color_weak slds-text-body_small">{prod.categoryName}</p>
                                                    </div>
                                                </div>
                                                <p class="slds-text-color_success slds-text-heading_small slds-m-bottom_x-small">
                                                    ₹{prod.Unit_Price__c}
                                                </p>
                                                <template if:true={prod.isAdded}>
                                                    <lightning-badge label="Added ✓"></lightning-badge>
                                                </template>
                                                <template if:false={prod.isAdded}>
                                                    <lightning-button
                                                        label="+ Add"
                                                        variant="brand"
                                                        size="small"
                                                        data-id={prod.Id}
                                                        data-name={prod.Name}
                                                        data-price={prod.Unit_Price__c}
                                                        data-category={prod.categoryName}
                                                        onclick={handleAddProduct}>
                                                    </lightning-button>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasFilteredProducts}>
                                <p class="slds-text-color_weak slds-m-top_small">No products found.</p>
                            </template>
                        </div>
                    </template>

                    <!-- No category selected -->
                    <template if:false={showProducts}>
                        <div class="slds-m-top_medium slds-text-align_center slds-p-around_medium">
                            <lightning-icon icon-name="utility:category" size="medium"></lightning-icon>
                            <p class="slds-text-color_weak slds-m-top_small">Select a category to view products</p>
                        </div>
                    </template>
                </div>

                <!-- ORDER ITEMS -->
                <div class="slds-section slds-is-open slds-m-bottom_medium">
                    <h3 class="slds-section__title slds-theme_shade slds-p-around_x-small">
                        <span class="slds-truncate">Order Items ({lineItemCount})</span>
                    </h3>

                    <template if:true={hasLineItems}>
                        <lightning-datatable
                            key-field="productId"
                            data={lineItems}
                            columns={columns}
                            draft-values={draftValues}
                            onsave={handleQtyChange}
                            onrowaction={handleRowAction}
                            hide-checkbox-column>
                        </lightning-datatable>

                        <!-- Grand Total -->
                        <div class="slds-grid slds-grid_align-end slds-m-top_small slds-p-right_small">
                            <div class="slds-col slds-no-flex">
                                <div class="slds-box slds-box_x-small slds-theme_shade">
                                    <span class="slds-text-body_regular">Grand Total: </span>
                                    <span class="slds-text-heading_small slds-text-color_success">
                                        ₹{grandTotal}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Clear All -->
                        <div class="slds-m-top_x-small">
                            <lightning-button
                                label="Clear All"
                                icon-name="utility:delete"
                                onclick={handleClearAll}
                                variant="destructive-text">
                            </lightning-button>
                        </div>
                    </template>

                    <template if:false={hasLineItems}>
                        <div class="slds-m-top_medium slds-text-align_center slds-p-around_medium">
                            <lightning-icon icon-name="utility:cart" size="medium"></lightning-icon>
                            <p class="slds-text-color_weak slds-m-top_small">No products added yet</p>
                        </div>
                    </template>
                </div>

                <!-- ACTION BUTTONS -->
                <div class="slds-grid slds-grid_align-spread slds-m-top_medium">
                    <lightning-button label="Cancel" onclick={handleReset}>
                    </lightning-button>
                    <lightning-button
                        label="Create Order"
                        variant="brand"
                        icon-name="utility:save"
                        onclick={handleCreateOrder}
                        disabled={isLoading}>
                    </lightning-button>
                </div>

                <!-- Saving Spinner -->
                <template if:true={isLoading}>
                    <div class="slds-m-top_small slds-text-align_center">
                        <lightning-spinner alternative-text="Creating order..." size="small"></lightning-spinner>
                        <p class="slds-text-color_weak slds-m-top_x-small">Creating order, please wait...</p>
                    </div>
                </template>

            </div>
        </template>

    </lightning-card>
</template>
